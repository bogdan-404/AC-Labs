services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: labdemo
      POSTGRES_USER: labdemo
      POSTGRES_PASSWORD: labdemo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labdemo -d labdemo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: labdemo
      DB_USER: labdemo
      DB_PASSWORD: labdemo
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  pgdata:
