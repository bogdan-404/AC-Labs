# Cloud Run deploy (backend → frontend with correct API URL).
#
# One-time as project Owner (GitHub SA cannot enable APIs — needs Service Usage Admin):
#   APIs → Library → enable for this project:
#     - Cloud Resource Manager API
#     - Service Usage API
#     - Artifact Registry API
#     - Cloud Run API
#   Then create Docker repo (or let the workflow create it if SA has Artifact Registry Admin):
#     gcloud artifacts repositories create lab-docker --repository-format=docker --location=REGION
#
# GitHub → Settings → Secrets → Actions:
#   GCP_SA_KEY              — full JSON key for deploy SA
#   GCP_PROJECT_ID        — project id string (e.g. ac-labs-492118), not only the numeric project number
#   SPRING_DATASOURCE_URL / USERNAME / PASSWORD — Postgres must accept connections from the
#   internet (or use Cloud SQL + connector). Managed DBs often need ?sslmode=require on the URL.
#   If deploy fails “failed to listen on PORT”, open the Logs URL in the error — usually DB
#   connection / Flyway. IAM “allUsers” warning: run add-iam-policy-binding (see Cloud Run docs).
#
# IAM on the deploy service account (example):
#   roles/run.admin, roles/artifactregistry.writer, roles/iam.serviceAccountUser
#   (+ roles/artifactregistry.admin if the workflow should create the lab-docker repo)
#
# Change REGION if needed.
name: CI/CD — Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  AR_REPO: lab-docker
  BACKEND_SERVICE: lab-backend
  FRONTEND_SERVICE: lab-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require GCP_PROJECT_ID secret
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::Add repository secret GCP_PROJECT_ID (e.g. ac-labs-492118). Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Artifact Registry (create if missing)
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} --location=${{ env.REGION }} \
            || gcloud artifacts repositories create ${{ env.AR_REPO }} \
                 --repository-format=docker --location=${{ env.REGION }} --description="Lab images"

      - name: Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend image
        run: |
          REG="${{ env.REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ env.AR_REPO }}"
          IMG="$REG/backend:${{ github.sha }}"
          docker build -t "$IMG" ./backend
          docker push "$IMG"
          echo "BACKEND_IMAGE=$IMG" >> "$GITHUB_ENV"

      # Use alternate delimiter so JDBC URLs can contain commas; avoid commas in password or URL-encode.
      - name: Deploy backend to Cloud Run
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image "$BACKEND_IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-invoker-iam-check \
            --port 8080 \
            --cpu 1 \
            --memory 1Gi \
            --cpu-boost \
            --set-env-vars "^##^SPRING_PROFILES_ACTIVE=cloudrun##^SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}##^SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}##^SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}##^JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0"

      - name: Allow unauthenticated invoker (backend)
        run: |
          gcloud run services add-iam-policy-binding ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --member=allUsers \
            --role=roles/run.invoker \
            --platform=managed

      - name: Backend service URL
        id: backend
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL"

      - name: Build & push frontend image
        run: |
          REG="${{ env.REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ env.AR_REPO }}"
          IMG="$REG/frontend:${{ github.sha }}"
          docker build \
            --build-arg "VITE_API_BASE=${{ steps.backend.outputs.url }}" \
            -t "$IMG" ./frontend
          docker push "$IMG"
          echo "FRONTEND_IMAGE=$IMG" >> "$GITHUB_ENV"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image "$FRONTEND_IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-invoker-iam-check \
            --port 8080 \
            --memory 256Mi

      - name: Allow unauthenticated invoker (frontend)
        run: |
          gcloud run services add-iam-policy-binding ${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --member=allUsers \
            --role=roles/run.invoker \
            --platform=managed

      - name: Frontend service URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "### Cloud Run URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend (open in browser):** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Backend API:** ${{ steps.backend.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
