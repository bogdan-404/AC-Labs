# Cloud Run deploy (backend → frontend with correct API URL).
#
# One-time as project Owner (GitHub SA cannot enable APIs — needs Service Usage Admin):
#   APIs → Library → enable for this project:
#     - Cloud Resource Manager API
#     - Service Usage API
#     - Artifact Registry API
#     - Cloud Run API
#   Then create Docker repo (or let the workflow create it if SA has Artifact Registry Admin):
#     gcloud artifacts repositories create lab-docker --repository-format=docker --location=REGION
#
# GitHub → Settings → Secrets → Actions:
#   GCP_SA_KEY, GCP_PROJECT_ID
#
# Backend on Cloud Run uses profiles demo+cloudrun = embedded H2 (no external Postgres). Data is
# ephemeral. To use Postgres instead: change deploy step to SPRING_PROFILES_ACTIVE=cloudrun and pass
# SPRING_DATASOURCE_URL / USERNAME / PASSWORD (DB must be reachable from Cloud Run, often ?sslmode=require).
#   Deploy does NOT set public access (no setIamPolicy on the CI SA). To open the app in a
#   browser without auth, once as project Owner: Cloud Run → service → Security → Allow
#   unauthenticated invocations (or grant roles/run.admin to the deploy SA and use --allow-unauthenticated).
#
# IAM on the deploy service account (example):
#   roles/run.admin, roles/artifactregistry.writer, roles/iam.serviceAccountUser
#   (+ roles/artifactregistry.admin if the workflow should create the lab-docker repo)
#
# Change REGION if needed.
name: CI/CD — Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  AR_REPO: lab-docker
  BACKEND_SERVICE: lab-backend
  FRONTEND_SERVICE: lab-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require GCP_PROJECT_ID secret
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::Add repository secret GCP_PROJECT_ID (e.g. ac-labs-492118). Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Artifact Registry (create if missing)
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} --location=${{ env.REGION }} \
            || gcloud artifacts repositories create ${{ env.AR_REPO }} \
                 --repository-format=docker --location=${{ env.REGION }} --description="Lab images"

      - name: Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend image
        run: |
          REG="${{ env.REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ env.AR_REPO }}"
          IMG="$REG/backend:${{ github.sha }}"
          docker build -t "$IMG" ./backend
          docker push "$IMG"
          echo "BACKEND_IMAGE=$IMG" >> "$GITHUB_ENV"

      - name: Deploy backend to Cloud Run
        run: |
          # demo+cloudrun = in-memory H2 (no Postgres). Long TCP probe for slow JVM cold start.
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image "$BACKEND_IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --cpu 1 \
            --memory 2Gi \
            --cpu-boost \
            --startup-probe=initialDelaySeconds=10,timeoutSeconds=10,periodSeconds=10,failureThreshold=23,tcpSocket.port=8080 \
            --set-env-vars "^##^SPRING_PROFILES_ACTIVE=demo,cloudrun##^JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70.0"

      - name: Backend service URL
        id: backend
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL"

      - name: Build & push frontend image
        run: |
          REG="${{ env.REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ env.AR_REPO }}"
          IMG="$REG/frontend:${{ github.sha }}"
          docker build \
            --build-arg "VITE_API_BASE=${{ steps.backend.outputs.url }}" \
            -t "$IMG" ./frontend
          docker push "$IMG"
          echo "FRONTEND_IMAGE=$IMG" >> "$GITHUB_ENV"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image "$FRONTEND_IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --memory 256Mi

      - name: Frontend service URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "### Cloud Run URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend:** $URL (requires auth until you allow unauthenticated in Console)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Backend:** ${{ steps.backend.outputs.url }} (same)" >> "$GITHUB_STEP_SUMMARY"
