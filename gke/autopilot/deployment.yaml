# Two workloads for GKE Autopilot: Spring Boot API + frontend.
# Autopilot requires resource requests on every container.
# Replace *_IMAGE_PLACEHOLDER values before apply, or use the GitHub workflow which runs sed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: gke-lab
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: backend
          image: BACKEND_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: demo,cloudrun
            - name: JAVA_TOOL_OPTIONS
              value: -XX:MaxRAMPercentage=70.0
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gke-lab
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: FRONTEND_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
