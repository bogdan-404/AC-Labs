# External access: Autopilot provisions a Google Cloud Load Balancer (may incur cost).
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: gke-lab
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gke-lab
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
