# In-memory H2 for Cloud Run / demos when Postgres is not available (data is lost on restart/scale-to-zero).
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:labdemo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
