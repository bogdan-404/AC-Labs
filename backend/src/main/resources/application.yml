spring:
  application:
    name: demo-backend
  datasource:
    # SPRING_DATASOURCE_* (set in Compose/K8s) overrides this; avoids localhost when env is missing in some runtimes
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:labdemo}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:labdemo}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:labdemo}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true

server:
  # Cloud Run probes PORT; bind all interfaces (not only loopback).
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}
