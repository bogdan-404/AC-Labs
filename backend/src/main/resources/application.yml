spring:
  application:
    name: demo-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:labdemo}
    username: ${DB_USER:labdemo}
    password: ${DB_PASSWORD:labdemo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
